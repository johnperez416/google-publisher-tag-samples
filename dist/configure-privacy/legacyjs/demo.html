<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Customize privacy settings for GPT ad requests." />
    <title>Configure privacy settings</title>
    <script
      async
      src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"
      crossorigin="anonymous"
    ></script>
    <script>
      window.googletag = window.googletag || { cmd: [] };

      googletag.cmd.push(function () {
        // Define an ad slot for div with id "banner-ad".
        googletag
          .defineSlot("/6355419/Travel", [728, 90], "banner-ad")
          .setTargeting("test", "privacy")
          .addService(googletag.pubads());

        // Enable the PubAdsService.
        googletag.enableServices();
      });

      function toggleNonPersonalizedAds() {
        var isEnabled = this.checked;

        googletag.cmd.push(function () {
          googletag.pubads().setPrivacySettings({
            nonPersonalizedAds: isEnabled,
          });

          // Refresh all ads on the page.
          googletag.pubads().refresh();
        });
      }

      function toggleRestrictDataProcessing() {
        var isEnabled = this.checked;

        googletag.cmd.push(function () {
          googletag.pubads().setPrivacySettings({
            restrictDataProcessing: isEnabled,
          });

          // Refresh all ads on the page.
          googletag.pubads().refresh();
        });
      }

      function changeAgeTreatment() {
        var ageTreatment = this.value;

        googletag.cmd.push(function () {
          googletag.pubads().setPrivacySettings({
            tagForAgeTreatment: googletag.enums.TagForAgeTreatment[ageTreatment],
          });

          // Refresh all ads on the page.
          googletag.pubads().refresh();
        });
      }

      function toggleDisablePersonalization() {
        var isEnabled = this.checked;

        googletag.cmd.push(function () {
          googletag.setConfig({
            privacyTreatments: isEnabled ? { treatments: ["disablePersonalization"] } : null,
          });

          // Refresh all ads on the page.
          googletag.pubads().refresh();
        });
      }
    </script>
    <style>
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
        margin-top: 1rem;
        font-family: sans-serif;
      }

      .section h2 {
        font-size: 1.2rem;
        margin-bottom: 1rem;
      }

      .row {
        display: flex;
        align-items: center;
        margin-bottom: 0.75rem;
        gap: 0.5rem;
      }

      .label-text {
        font-size: 0.9rem;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 36px;
        height: 20px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.4s;
        border-radius: 20px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.4s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #2196f3;
      }

      input:focus-visible + .slider {
        outline: 2px solid #2196f3;
        outline-offset: 2px;
      }

      input:checked + .slider:before {
        transform: translateX(16px);
      }

      select {
        padding: 0.25rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="banner-ad" style="width: 728px; height: 90px"></div>
    <div class="controls">
      <div class="section">
        <h2>Privacy settings</h2>
        <div class="row">
          <label for="tfatSelect" class="label-text">Age Treatment:</label>
          <select id="tfatSelect">
            <option value="UNSPECIFIED">Unspecified</option>
            <option value="CHILD">Child</option>
            <option value="TEEN">Teen</option>
          </select>
        </div>
        <div class="row">
          <label class="switch">
            <input type="checkbox" id="npaCheckbox" />
            <span class="slider"></span>
          </label>
          <span class="label-text">Non-personalized Ads</span>
        </div>
        <div class="row">
          <label class="switch">
            <input type="checkbox" id="rdpCheckbox" />
            <span class="slider"></span>
          </label>
          <span class="label-text">Restricted Data Processing</span>
        </div>
      </div>

      <div class="section">
        <h2>Privacy treatments</h2>
        <div class="row">
          <label class="switch">
            <input type="checkbox" id="disablePersonalizationCheckbox" />
            <span class="slider"></span>
          </label>
          <span class="label-text">Disable Personalization</span>
        </div>
      </div>
    </div>
    <script>
      googletag.cmd.push(function () {
        // Request and render an ad for the "banner-ad" slot.
        googletag.display("banner-ad");

        // Register change event handlers.
        document.getElementById("npaCheckbox").addEventListener("change", toggleNonPersonalizedAds);
        document
          .getElementById("rdpCheckbox")
          .addEventListener("change", toggleRestrictDataProcessing);
        document.getElementById("tfatSelect").addEventListener("change", changeAgeTreatment);
        document
          .getElementById("disablePersonalizationCheckbox")
          .addEventListener("change", toggleDisablePersonalization);
      });
    </script>
  </body>
</html>
